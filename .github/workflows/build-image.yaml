name: Build and Push Pi Prod Base

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate Source SBOM
        run: |
          curl -Lo $RUNNER_TEMP/sbom-tool https://github.com/microsoft/sbom-tool/releases/latest/download/sbom-tool-linux-x64
          chmod +x $RUNNER_TEMP/sbom-tool
          
          # Adjusted paths to scan the root directory instead of ./brownout
          $RUNNER_TEMP/sbom-tool generate -b . -bc . -pn PiProdBase -pv 1.0.0 -ps UnderperformingSoftware -nsb https://github.com/${{ github.repository }}/sbom/pi-prod-base -V Verbose

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v7
        with:
          name: base-source-sbom-manifest
          path: ./_manifest

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/pi-prod-base
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: . 
          platforms: linux/arm64
          push: true
          sbom: true
          provenance: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}